{% set version = "1.1.0" %}

package:
  name: tapir-pipeline
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/cc/ea/d8242fe64b9215eaf430d0cdbea710d12d82bc63ba292ffff7963016acd6/tapir_pipeline-{{ version }}.tar.gz
  sha256: ed922d01603de2050bf31e72a0eaac00528a080066fc891d3db299b3b1de9946

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - tapir = tapir:main
  noarch: python
  string: py_0
  post-link: post-link.sh
  run_exports:
    - {{ pin_subpackage('tapir-pipeline', max_pin="x") }}

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools >=61,<77
  run:
    - python >=3.11
    - biopython >=1.80
    - cobra-meta
    - fastp
    - bowtie2
    - samtools
    - spades >=3.15
    - megahit
    - mmseqs2
    - coverm
    - pip

test:
  commands:
    - tapir --help

about:
  home: https://github.com/LymF/TAPIR
  license: MIT
  license_file: LICENSE
  summary: "End-to-end pipeline for RNA virus discovery from metatranscriptomic data"
  description: |
    TAPIR (Transcriptome Assembly Pipeline for Identification of RNA viruses)
    discovers and annotates RNA viruses from paired-end metatranscriptomic
    Illumina reads. It integrates quality control, host decontamination,
    triple-strategy de novo assembly (rnaSPAdes, SPAdes --rnaviral, MEGAHIT),
    dereplication, contig extension, cross-sample consolidation, and
    taxonomic annotation via ViralQuest.
  doc_url: https://github.com/LymF/TAPIR#readme
  dev_url: https://github.com/LymF/TAPIR

extra:
  recipe-maintainers:
    - LymF
