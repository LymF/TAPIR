{% set version = "1.0.0" %}

package:
  name: tapir-rna
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/t/tapir-rna/tapir-rna-{{ version }}.tar.gz
  # sha256 will be filled after PyPI upload

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - tapir = tapir:main
  noarch: python

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools >=68
  run:
    - python >=3.11
    # Python dependencies
    - biopython >=1.80
    - cobra-meta
    - viralquest
    # External bioinformatics tools
    - fastp
    - bowtie2
    - samtools
    - spades >=3.15
    - megahit
    - mmseqs2
    - coverm

test:
  commands:
    - tapir --help

about:
  home: https://github.com/LymF/TAPIR
  license: MIT
  license_file: LICENSE
  summary: "End-to-end pipeline for RNA virus discovery from metatranscriptomic data"
  description: |
    TAPIR (Transcriptome Assembly Pipeline for Identification of RNA viruses)
    discovers and annotates RNA viruses from paired-end metatranscriptomic
    Illumina reads. It integrates quality control, host decontamination,
    triple-strategy de novo assembly (rnaSPAdes, SPAdes --rnaviral, MEGAHIT),
    dereplication, contig extension, cross-sample consolidation, and
    taxonomic annotation via ViralQuest.
  doc_url: https://github.com/LymF/TAPIR#readme
  dev_url: https://github.com/LymF/TAPIR

extra:
  recipe-maintainers:
    - LymF
